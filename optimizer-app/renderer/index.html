<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Optimizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <h1>Optimizer</h1>
      </div>
      <button id="btn-history" class="btn-ghost">Histórico</button>
    </header>

    <main id="view-dashboard" class="view">
      <section class="score-card">
        <div class="score-ring" id="score-ring">
          <span id="score-value">--</span>
        </div>
        <div class="score-info">
          <h2 id="score-label">Nenhum scan ainda</h2>
          <p>Rode um scan para ver a saúde real do seu PC.</p>
          <button id="btn-scan" class="btn-primary">Escanear PC</button>
        </div>
      </section>

      <section class="actions-section">
        <div class="actions-header">
          <h3>Ações recomendadas</h3>
          <button id="btn-apply-all" class="btn-primary btn-small" disabled>Otimizar tudo</button>
        </div>
        <ul id="actions-list" class="actions-list">
          <li class="empty-state">Nenhuma ação ainda. Escaneie seu PC primeiro.</li>
        </ul>
      </section>
    </main>

    <main id="view-history" class="view hidden">
      <h3>Histórico de otimizações</h3>
      <ul id="history-list" class="actions-list"></ul>
      <button id="btn-back" class="btn-ghost">← Voltar</button>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
